<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>核算队列 · 敬城设计云</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <style>
    .drawer.drawer-lg { width: 1080px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .three-col { grid-template-columns: 1fr; } }
    .calc-block { background: var(--bg-hover); border-radius: 8px; padding: 16px; }
    .calc-block h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 12px; }
    .calc-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .calc-row.hl { border-top: 1px dashed var(--divider); padding-top: 10px; margin-top: 6px; font-weight: 600; }
    .calc-total { background: var(--brand-primary-bg); color: var(--brand-primary); padding: 12px; border-radius: 6px; text-align: center; }
    .calc-total .n { font-size: 24px; font-weight: 700; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-breadcrumb">
        <a href="../workbench/dashboard.html">工作台</a>
        <span class="sep">/</span>
        <a href="javascript:void(0)">设计运营</a>
        <span class="sep">/</span>
        <span class="current">核算队列</span>
      </div>
      <div class="page-title-bar">
        <div>
          <div class="page-title">分成核算队列</div>
          <div class="page-title-desc">项目触发核算后进入本队列，运营/财务复核并进入审批。点击每一行查看 <b>三栏明细</b>：设计费 → 应分 → 实分。</div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-default" onclick="toast('已重新计算','success')">🔄 重新核算</button>
          <button class="btn btn-primary" onclick="toast('批量提审 2 条','success')">批量提交审批</button>
        </div>
      </div>
    </div>
    <div class="page-body">
      <div class="filter-bar">
        <div class="filter-item"><span class="filter-label">状态</span>
          <select class="filter-select"><option>全部</option><option>待复核</option><option>待审批</option><option>已审批</option><option>异常</option></select>
        </div>
        <div class="filter-item"><span class="filter-label">周期</span>
          <select class="filter-select"><option>本月</option><option>本季</option><option>本年</option></select>
        </div>
        <div class="filter-item"><span class="filter-label">角色</span>
          <select class="filter-select"><option>全部</option><option>2D</option><option>3D</option><option>协调员</option></select>
        </div>
        <input class="filter-search" placeholder="搜索项目 / 设计师" />
      </div>

      <div class="card">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" /></th>
              <th>项目</th>
              <th>设计师</th>
              <th>角色</th>
              <th style="text-align:right;">设计费</th>
              <th style="text-align:right;">应分</th>
              <th style="text-align:right;">调节系数</th>
              <th style="text-align:right;">实分</th>
              <th>调整/审核</th>
              <th>状态</th>
              <th style="text-align:right;">操作</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="drawer-mask" id="detail-mask" onclick="closeDrawer('detail-drawer')"></div>
  <div class="drawer drawer-lg" id="detail-drawer">
    <div class="drawer-header">
      <div class="drawer-title">📊 核算明细（三栏对照）</div>
      <div class="modal-close" onclick="closeDrawer('detail-drawer')">✕</div>
    </div>
    <div class="drawer-body" id="detail-body"></div>
    <div class="drawer-footer" id="detail-footer"></div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/shell.js"></script>
  <script>
    (function () {
      const tbody = document.getElementById('tbody');
      const isAdmin = MOCK.currentRole().scope === 'all'; // 平台负责人审批手动分成

      function renderFooter(c) {
        const foot = document.getElementById('detail-footer');
        const pending = c.adjustType === '手动调整' && c.reviewStatus === '待审核';
        let html = `<button class="btn btn-default" onclick="closeDrawer('detail-drawer')">关闭</button>`;
        if (pending && isAdmin) {
          html += `<button class="btn btn-danger-ghost" data-drawer-rej="${c.id}">驳回调整</button>
                   <button class="btn btn-primary" data-drawer-pass="${c.id}">✓ 通过并生效</button>`;
        } else if (pending && !isAdmin) {
          html += `<span class="text-sm text-secondary" style="margin-left:auto;">该分成调整待平台负责人审批（当前角色只读）</span>`;
        } else {
          html += `<button class="btn btn-danger-ghost" onclick="toast('已标记异常，运营会介入','warning')">🚩 标记异常</button>`;
        }
        foot.innerHTML = html;
        const pb = foot.querySelector('[data-drawer-pass]'); if (pb) pb.addEventListener('click', () => { MOCK.reviewCommission(c.id, true); toast('已通过分成调整，金额生效', 'success'); closeDrawer('detail-drawer'); renderRows(); });
        const rb = foot.querySelector('[data-drawer-rej]'); if (rb) rb.addEventListener('click', () => { MOCK.reviewCommission(c.id, false); toast('已驳回分成调整', 'info'); closeDrawer('detail-drawer'); renderRows(); });
      }

      function adjustCell(c) {
        if (c.adjustType !== '手动调整') return '<span class="text-sm text-secondary">系统自动</span>';
        const rv = c.reviewStatus === '待审核' ? 'tag-warning' : c.reviewStatus === '已通过' ? 'tag-success' : c.reviewStatus === '已驳回' ? 'tag-danger' : '';
        return `<div><span class="tag ${rv}">${c.reviewStatus}</span></div>
          <div class="text-sm text-secondary" style="margin-top:2px;">${c.adjustReason || '其他'}${c.manualAmount != null ? ` · 拟 ¥${formatMoney(c.manualAmount, 0)}` : ''}</div>`;
      }

      function renderRows() {
        tbody.innerHTML = '';
        const rows = MOCK.scopeCommissions(MOCK.COMMISSIONS);
        if (!rows.length) { tbody.innerHTML = `<tr><td colspan="11"><div class="empty" style="padding:32px 0;"><div class="empty-title">当前范围暂无核算记录</div></div></td></tr>`; return; }
        rows.forEach(c => {
          const tr = document.createElement('tr');
          tr.style.cursor = 'pointer';
          const factorSum = c.qualityFactor * c.timelinessFactor * c.satisfactionFactor * c.paymentFactor;
          const pending = c.adjustType === '手动调整' && c.reviewStatus === '待审核';
          const effective = MOCK.commissionFinal(c);
          const actCell = pending
            ? `<div style="text-decoration:line-through;color:var(--text-placeholder);font-size:12px;">¥${formatMoney(c.actualAmount, 0)}</div><div style="font-family:var(--font-mono);font-weight:600;color:var(--danger);">¥${formatMoney(c.manualAmount, 0)}</div>`
            : `<span style="font-family:var(--font-mono);font-weight:600;color:var(--brand-primary);">¥${formatMoney(effective, 0)}</span>`;
          const opBtns = (isAdmin && pending)
            ? `<button class="btn btn-text" style="color:var(--success);" data-pass="${c.id}" onclick="event.stopPropagation();">通过</button>
               <button class="btn btn-text" style="color:var(--danger);" data-rej="${c.id}" onclick="event.stopPropagation();">驳回</button>`
            : `<button class="btn btn-text" data-id="${c.id}">查看</button>`;
          tr.innerHTML = `
            <td><input type="checkbox" onclick="event.stopPropagation();" /></td>
            <td><div style="font-weight:500;">${c.projectName}</div><div class="text-sm text-secondary">${c.project}</div></td>
            <td><div style="display:flex;align-items:center;gap:6px;"><div class="avatar sm" data-color="${colorFrom(c.designerName)}">${initials(c.designerName)}</div>${c.designerName}${c.resigned ? ' <span class="tag tag-danger" style="font-size:10px;">离职</span>' : ''}</div></td>
            <td><span class="tag tag-brand">${c.role}</span></td>
            <td style="text-align:right;font-family:var(--font-mono);">¥${formatMoney(c.designFee, 0)}</td>
            <td style="text-align:right;font-family:var(--font-mono);">¥${formatMoney(c.dueAmount, 0)}</td>
            <td style="text-align:right;"><span class="tag ${factorSum > 1 ? 'tag-success' : factorSum < 1 ? 'tag-danger' : ''}">×${factorSum.toFixed(2)}</span></td>
            <td style="text-align:right;">${actCell}</td>
            <td>${adjustCell(c)}</td>
            <td><span class="tag ${c.status === '已审批' ? 'tag-success' : 'tag-warning'}">${c.status}</span></td>
            <td style="text-align:right;white-space:nowrap;">${opBtns}</td>
          `;
          tr.addEventListener('click', () => openDetail(c));
          tbody.appendChild(tr);
        });
        tbody.querySelectorAll('[data-pass]').forEach(b => b.addEventListener('click', () => {
          MOCK.reviewCommission(b.dataset.pass, true); toast('已通过分成调整，金额生效', 'success'); renderRows();
        }));
        tbody.querySelectorAll('[data-rej]').forEach(b => b.addEventListener('click', () => {
          MOCK.reviewCommission(b.dataset.rej, false); toast('已驳回分成调整', 'info'); renderRows();
        }));
      }
      renderRows();

      function openDetail(c) {
        document.getElementById('detail-body').innerHTML = `
          <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--brand-primary-bg);border-radius:8px;margin-bottom:20px;">
            <div class="avatar lg" data-color="${colorFrom(c.designerName)}">${initials(c.designerName)}</div>
            <div style="flex:1;">
              <div style="font-weight:600;">${c.designerName} <span class="tag tag-brand">${c.role}</span></div>
              <div class="text-sm text-secondary">${c.projectName} · ${c.project}</div>
            </div>
            <div style="text-align:right;">
              <div class="text-sm text-secondary">实际分成金额</div>
              <div style="font-size:28px;font-weight:700;color:var(--brand-primary);font-family:var(--font-mono);">¥${formatMoney(MOCK.commissionFinal(c), 2)}</div>
            </div>
          </div>
          ${c.adjustType === '手动调整' ? `<div style="background:#fef2f2;border:1px solid #fecaca;color:var(--danger);padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;">
            ⚠ 本条为负责人<b>手动调整</b>（原因：${c.adjustReason || '其他'}）· 系统自动值 ¥${formatMoney(c.actualAmount, 0)} → 手动值 <b>¥${formatMoney(c.manualAmount != null ? c.manualAmount : c.actualAmount, 0)}</b> · 审核状态：${c.reviewStatus}${c.reviewer ? ' · ' + c.reviewer : ''}${c.reassignFrom ? ` · 接手自 ${MOCK.getDesigner(c.reassignFrom).name}` : ''}
          </div>` : ''}

          <div class="three-col">
            <div class="calc-block">
              <h4>① 设计费用</h4>
              <div class="calc-row"><span>项目类型</span><span>${c.role.includes('2D') ? '家装 · 全案' : '工装'}</span></div>
              <div class="calc-row"><span>基准价</span><span>380 元/㎡</span></div>
              <div class="calc-row"><span>面积</span><span>220 ㎡</span></div>
              <div class="calc-row"><span>复杂度系数</span><span>×1.20</span></div>
              <div class="calc-row"><span>阶段权重</span><span>×${c.role.includes('2D') ? '40%' : '30%'}</span></div>
              <div class="calc-row hl"><span>设计费</span><span>¥${formatMoney(c.designFee, 2)}</span></div>
              <div class="calc-total" style="margin-top:12px;">
                <div class="text-sm">设计费用</div>
                <div class="n">¥${formatMoney(c.designFee, 0)}</div>
              </div>
            </div>

            <div class="calc-block">
              <h4>② 应分金额</h4>
              <div class="calc-row"><span>设计费</span><span>¥${formatMoney(c.designFee, 2)}</span></div>
              <div class="calc-row"><span>分成模板</span><span>${c.role} 标准模板</span></div>
              <div class="calc-row"><span>基础比例</span><span>${(c.dueRate * 100).toFixed(0)}%</span></div>
              <div class="calc-row"><span>规则版本</span><span>v3.2 (2026-01)</span></div>
              <div class="calc-row"><span>&nbsp;</span><span></span></div>
              <div class="calc-row hl"><span>应分</span><span>¥${formatMoney(c.dueAmount, 2)}</span></div>
              <div class="calc-total" style="margin-top:12px;">
                <div class="text-sm">应分金额</div>
                <div class="n">¥${formatMoney(c.dueAmount, 0)}</div>
              </div>
            </div>

            <div class="calc-block">
              <h4>③ 实分金额</h4>
              <div class="calc-row"><span>应分</span><span>¥${formatMoney(c.dueAmount, 2)}</span></div>
              <div class="calc-row"><span>× 质量系数</span><span>${c.qualityFactor.toFixed(2)}</span></div>
              <div class="calc-row"><span>× 时效系数</span><span>${c.timelinessFactor.toFixed(2)}</span></div>
              ${(function () { const pj = MOCK.getProject(c.project); const act = MOCK.projectHours(c.project); const base = ['需求收集', '平面布局图', '3D 意向', '全屋 3D'].reduce((s, n) => s + MOCK.stageBaseline(pj || { area: 120 }, n), 0); const ratio = base ? Math.round(act / base * 100) : 0; return `<div class="calc-row" style="font-size:12px;color:var(--text-secondary);"><span>　└ 工时依据</span><span>${act}h / 基准 ${base}h（${ratio}%）</span></div>`; })()}
              <div class="calc-row"><span>× 满意度系数</span><span>${c.satisfactionFactor.toFixed(2)}</span></div>
              <div class="calc-row"><span>× 回款系数</span><span>${c.paymentFactor.toFixed(2)}</span></div>
              <div class="calc-row hl"><span>实分</span><span>¥${formatMoney(c.actualAmount, 2)}</span></div>
              <div class="calc-total" style="margin-top:12px;background:var(--success-bg);color:var(--success);">
                <div class="text-sm">实分金额</div>
                <div class="n">¥${formatMoney(c.actualAmount, 0)}</div>
              </div>
            </div>
          </div>

          <div style="background:var(--info-bg);color:var(--info);padding:12px;border-radius:6px;margin-top:16px;font-size:13px;">
            💡 每一项数字均可点击追溯来源（版本号、里程碑、评审结论、回款记录等）。若结果异常，请标记后系统会通知运营/财务复核。
          </div>

          <div style="margin-top:20px;">
            <h4 style="font-size:14px;margin-bottom:8px;">📜 变更记录 (Audit Log)</h4>
            <div class="timeline">
              <div class="timeline-item"><div class="timeline-title">系统自动生成本次核算</div><div class="timeline-time">${c.calcAt}</div></div>
              <div class="timeline-item success"><div class="timeline-title">质量评分录入 4.6/5.0 · 触发系数 1.10</div><div class="timeline-time">2026-07-10 15:20 · 总监 刘</div></div>
              <div class="timeline-item"><div class="timeline-title">项目验收通过</div><div class="timeline-time">2026-07-10 15:00 · 协调员 郑一</div></div>
            </div>
          </div>
        `;
        renderFooter(c);
        openDrawer('detail-drawer');
      }
    })();
  </script>
</body>
</html>
