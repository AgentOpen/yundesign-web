<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文件归档 · 敬城设计云</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <style>
    .file-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .fi-pdf { background: #EF4444; } .fi-img { background: #10B981; } .fi-720 { background: #8B5CF6; } .fi-xls { background: #059669; } .fi-zip { background: #F59E0B; } .fi-dwg { background: #3B82F6; }

    .files-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 1024px) { .files-layout { grid-template-columns: 1fr; } }
    .file-tree { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px; max-height: calc(100vh - 220px); overflow-y: auto; box-shadow: var(--shadow-card); }
    .tree-node { border-radius: 6px; }
    .tree-row { display: flex; align-items: center; gap: 6px; padding: 8px 8px; border-radius: 6px; cursor: pointer; }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row.active { background: var(--brand-primary-bg); }
    .tree-caret { width: 14px; text-align: center; color: var(--text-secondary); font-size: 10px; transition: transform .15s; flex-shrink: 0; }
    .tree-node.open > .tree-row .tree-caret { transform: rotate(90deg); }
    .tree-ico { flex-shrink: 0; }
    .tree-main { flex: 1; min-width: 0; }
    .tree-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-sub { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-count { font-size: 11px; background: var(--bg-hover); color: var(--text-secondary); border-radius: 8px; padding: 1px 7px; flex-shrink: 0; }
    .tree-children { display: none; padding-left: 20px; }
    .tree-node.open > .tree-children { display: block; }
    .tree-leaf { display: flex; align-items: center; gap: 6px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text-secondary); }
    .tree-leaf:hover { background: var(--bg-hover); }
    .tree-leaf.active { background: var(--brand-primary-bg); color: var(--brand-primary); }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-breadcrumb">
        <a href="../workbench/dashboard.html">工作台</a><span class="sep">/</span>
        <span class="current">M9 · 文件归档</span>
      </div>
      <div class="page-title-bar">
        <div>
          <div class="page-title">文件归档</div>
          <div class="page-title-desc">所有设计文件（需求 / 方案 / BOM / 报价 / 合同 / 交付物）按项目归档，支持检索（FR-M09-08）</div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-default" onclick="toast('已打包所选文件为 zip','success')">批量下载</button>
          <button class="btn btn-primary" onclick="toast('上传演示中','info')">上传文件</button>
        </div>
      </div>
    </div>

    <div class="page-body">
      <div class="filter-bar" style="margin-bottom:16px;">
        <div class="filter-item"><span class="filter-label">设计师</span><select class="filter-select" id="f-designer"><option value="">全部</option></select></div>
        <div class="filter-item"><span class="filter-label">面积</span><select class="filter-select" id="f-area">
          <option value="">全部</option><option value="0-100">≤100㎡</option><option value="100-300">100–300㎡</option><option value="300-500">300–500㎡</option><option value="500-99999">>500㎡</option>
        </select></div>
        <div class="filter-item"><span class="filter-label">类型</span><select class="filter-select" id="f-type">
          <option value="">全部类型</option><option>需求文档</option><option>平面图</option><option>3D/720°</option><option>效果图</option><option>BOM</option><option>报价单</option><option>合同</option>
        </select></div>
        <input class="filter-search" id="f-search" placeholder="搜索文件名 / 项目 / 上传人" style="flex:1;" />
      </div>

      <div class="files-layout">
        <!-- 左：项目树 -->
        <div class="file-tree" id="file-tree"></div>

        <!-- 右：文件列表 -->
        <div class="card">
          <div class="card-header">
            <div class="card-title" id="list-title">全部项目文件</div>
            <div class="flex gap-2"><span class="text-sm text-secondary" id="list-count"></span></div>
          </div>
          <div class="card-body" style="padding:0;">
            <table class="data-table">
              <thead><tr>
                <th class="row-checkbox"><input type="checkbox" id="chk-all" /></th>
                <th>文件</th><th>项目</th><th>类型</th><th>版本</th><th>上传人</th><th>时间</th><th class="col-actions">操作</th>
              </tr></thead>
              <tbody id="file-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/shell.js"></script>
  <script>
    (function () {
      const P = MOCK.scopeProjects(MOCK.PROJECTS);   // 依据当前角色数据范围

      // 设计师筛选下拉（按部门分组显示）
      const dSel = document.getElementById('f-designer');
      MOCK.DESIGNERS.filter(d => ['2D', '3D', '协调员'].includes(d.role)).forEach(d => dSel.insertAdjacentHTML('beforeend', `<option value="${d.id}">${MOCK.deptShort(d.dept)}·${d.name}</option>`));

      const ext = { '需求文档': ['pdf', 'fi-pdf'], '平面图': ['dwg', 'fi-dwg'], '3D/720°': ['720', 'fi-720'], 'BOM': ['xls', 'fi-xls'], '报价单': ['pdf', 'fi-pdf'], '合同': ['pdf', 'fi-pdf'], '效果图': ['img', 'fi-img'] };
      const types = ['需求文档', '平面图', '3D/720°', 'BOM', '报价单', '合同', '效果图'];

      // 生成文件：上传人取项目实际团队成员
      const files = [];
      P.forEach((p, pi) => {
        const members = (p.team && p.team.length) ? p.team : ['u001'];
        const n = 3 + (pi % 4);
        for (let i = 0; i < n; i++) {
          const t = types[(pi + i) % types.length];
          const e = ext[t];
          files.push({
            name: `${p.name.slice(0, 8)}_${t}_V${1 + (i % 3)}.${e[0] === '720' ? 'html' : e[0]}`,
            proj: p.id, type: t, ver: `V${1 + (i % 3)}.${i % 4}`,
            owner: members[(pi + i) % members.length],
            ts: `2026-07-${String(6 + ((pi + i) % 6)).padStart(2, '0')} ${10 + i}:${20 + i}`,
            icon: e[1]
          });
        }
      });

      let selProj = '', selType = '', fDesigner = '', fArea = '', fSearch = '';

      function areaMatch(p) {
        if (!fArea) return true;
        const [lo, hi] = fArea.split('-').map(Number);
        return p.area > lo && p.area <= hi;
      }
      // 文件是否命中当前筛选（不含 selProj/selType，用于树与列表的基础集）
      function baseMatch(f) {
        const p = MOCK.getProject(f.proj);
        if (fDesigner && f.owner !== fDesigner) return false;
        if (fArea && !areaMatch(p)) return false;
        if (fSearch) {
          const q = fSearch.toLowerCase();
          if (!(f.name + p.name + MOCK.getDesigner(f.owner).name).toLowerCase().includes(q)) return false;
        }
        return true;
      }

      // ---- 左侧项目树 ----
      function renderTree() {
        const base = files.filter(baseMatch);
        const tree = document.getElementById('file-tree');
        const totalFiles = base.length;
        let html = `<div class="tree-node open" data-proj-node="__all">
          <div class="tree-row ${selProj === '' ? 'active' : ''}" data-proj="">
            <span class="tree-caret">▶</span>
            <span class="tree-ico">🗂</span>
            <div class="tree-main"><div class="tree-title">全部项目</div><div class="tree-sub">${P.length} 个项目 · ${totalFiles} 个文件</div></div>
          </div><div class="tree-children">`;

        P.forEach(p => {
          const pf = base.filter(f => f.proj === p.id);
          if (!pf.length && (fDesigner || fArea || fSearch)) return; // 有筛选时隐藏空项目
          const byType = {};
          pf.forEach(f => { byType[f.type] = (byType[f.type] || 0) + 1; });
          const dsg = MOCK.names([...(p.d2d || []), ...(p.d3d || [])]) || '—';
          const open = selProj === p.id;
          html += `<div class="tree-node ${open ? 'open' : ''}" data-proj-node="${p.id}">
            <div class="tree-row ${selProj === p.id && !selType ? 'active' : ''}" data-proj="${p.id}">
              <span class="tree-caret">▶</span>
              <span class="tree-ico">📁</span>
              <div class="tree-main"><div class="tree-title">${p.name}</div><div class="tree-sub">${p.area}㎡ · ${dsg}</div></div>
              <span class="tree-count">${pf.length}</span>
            </div>
            <div class="tree-children">
              ${Object.keys(byType).map(t => `<div class="tree-leaf ${selProj === p.id && selType === t ? 'active' : ''}" data-proj="${p.id}" data-type="${t}"><span>📄</span><span style="flex:1;">${t}</span><span class="tree-count">${byType[t]}</span></div>`).join('')}
            </div>
          </div>`;
        });
        html += `</div></div>`;
        tree.innerHTML = html;

        // 事件：点击项目行（切换选中 + 展开）
        tree.querySelectorAll('.tree-row[data-proj]').forEach(row => {
          row.addEventListener('click', () => {
            const pid = row.getAttribute('data-proj');
            if (pid === '') { selProj = ''; selType = ''; }
            else { selProj = pid; selType = ''; }
            renderTree(); renderList();
          });
        });
        tree.querySelectorAll('.tree-leaf[data-type]').forEach(leaf => {
          leaf.addEventListener('click', (e) => {
            e.stopPropagation();
            selProj = leaf.getAttribute('data-proj'); selType = leaf.getAttribute('data-type');
            renderTree(); renderList();
          });
        });
      }

      // ---- 右侧文件列表 ----
      function renderList() {
        const list = files.filter(f => baseMatch(f) && (!selProj || f.proj === selProj) && (!selType || f.type === selType));
        document.getElementById('list-title').textContent = selProj ? (MOCK.getProject(selProj).name + (selType ? ' · ' + selType : '')) : '全部项目文件';
        document.getElementById('list-count').textContent = `共 ${list.length} 个文件`;
        document.getElementById('file-body').innerHTML = list.length ? list.map(f => {
          const p = MOCK.getProject(f.proj); const o = MOCK.getDesigner(f.owner);
          const label = f.icon.replace('fi-', '').toUpperCase();
          return `<tr>
            <td class="row-checkbox"><input type="checkbox" class="row-chk" /></td>
            <td><div style="display:flex;align-items:center;gap:10px;"><div class="file-icon ${f.icon}">${label.slice(0, 3)}</div><div style="font-weight:500;">${f.name}</div></div></td>
            <td>${p.name}</td>
            <td><span class="tag">${f.type}</span></td>
            <td>${f.ver}</td>
            <td><div style="display:flex;align-items:center;gap:6px;"><div class="avatar sm" data-color="${colorFrom(o.name)}">${initials(o.name)}</div>${o.name}<span class="text-placeholder" style="font-size:11px;"> · ${MOCK.deptShort(o.dept)}</span></div></td>
            <td class="text-sm text-secondary">${f.ts}</td>
            <td class="col-actions"><button class="btn btn-xs btn-text" onclick="toast('预览 ${f.name}','info')">预览</button><button class="btn btn-xs btn-text" onclick="toast('下载 ${f.name}','success')">下载</button></td>
          </tr>`;
        }).join('') : `<tr><td colspan="8"><div class="empty"><div class="empty-title">没有符合条件的文件</div><div class="empty-desc">试试调整筛选条件或搜索关键词</div></div></td></tr>`;
      }

      function rerender() { renderTree(); renderList(); }
      document.getElementById('f-designer').addEventListener('change', e => { fDesigner = e.target.value; rerender(); });
      document.getElementById('f-area').addEventListener('change', e => { fArea = e.target.value; rerender(); });
      document.getElementById('f-type').addEventListener('change', e => { selType = e.target.value; renderList(); });
      document.getElementById('f-search').addEventListener('input', debounce(e => { fSearch = e.target.value; rerender(); }, 200));
      document.getElementById('chk-all').addEventListener('change', e => document.querySelectorAll('.row-chk').forEach(c => c.checked = e.target.checked));
      rerender();
    })();
  </script>
</body>
</html>
