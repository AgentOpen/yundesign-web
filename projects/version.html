<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>版本管理与溯源 · 敬城设计云</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <style>
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; align-items: start; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    /* 左侧项目树（与「文件归档」一致） */
    .file-tree { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 8px; max-height: calc(100vh - 220px); overflow-y: auto; box-shadow: var(--shadow-card); }
    .tree-node { border-radius: 6px; }
    .tree-row { display: flex; align-items: center; gap: 6px; padding: 8px 8px; border-radius: 6px; cursor: pointer; }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row.active { background: var(--brand-primary-bg); }
    .tree-caret { width: 14px; text-align: center; color: var(--text-secondary); font-size: 10px; transition: transform .15s; flex-shrink: 0; }
    .tree-node.open > .tree-row .tree-caret { transform: rotate(90deg); }
    .tree-ico { flex-shrink: 0; }
    .tree-main { flex: 1; min-width: 0; }
    .tree-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-sub { font-size: 11px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tree-count { font-size: 11px; background: var(--bg-hover); color: var(--text-secondary); border-radius: 8px; padding: 1px 7px; flex-shrink: 0; }
    .tree-children { display: none; padding-left: 20px; }
    .tree-node.open > .tree-children { display: block; }

    /* 客户确认版本一览 */
    .final-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .final-card { border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px; background: #fff; position: relative; overflow: hidden; }
    .final-card.done { border-color: #A7E3C6; background: linear-gradient(180deg, #F2FBF6 0%, #fff 60%); }
    .final-card.active { border-color: #BCD0FA; background: linear-gradient(180deg, #F1F6FF 0%, #fff 60%); }
    .final-card .fc-stage { font-size: 13px; color: var(--text-secondary); }
    .final-card .fc-ver { font-size: 22px; font-weight: 700; font-family: var(--font-mono); margin-top: 2px; }
    .final-card .fc-req { font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; min-height: 34px; }
    .final-card .fc-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 12px; color: var(--text-secondary); }

    /* 阶段分组 */
    .stage-sec { margin-top: 16px; }
    .stage-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; background: var(--bg-hover); border: 1px solid var(--border); border-bottom: none; }
    .stage-head .st-name { font-weight: 600; font-size: 15px; }
    .stage-body { border: 1px solid var(--border); border-radius: 0 0 var(--radius-lg) var(--radius-lg); padding: 14px; background: #fff; }

    .v-row { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; margin-bottom: 10px; }
    .v-row:last-child { margin-bottom: 0; }
    .v-row.final { border-color: #A7E3C6; box-shadow: 0 0 0 3px rgba(37,178,109,.08); }
    .v-row.current { border-color: #BCD0FA; box-shadow: 0 0 0 3px rgba(78,124,246,.08); }
    .v-row.pending { border-color: #F0B429; background: var(--warning-bg); }
    .v-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .v-tag { font-family: var(--font-mono); background: var(--brand-primary-bg); color: var(--brand-primary); padding: 2px 10px; border-radius: 4px; font-size: 13px; font-weight: 700; }
    .v-who { display: flex; align-items: center; gap: 8px; }
    .v-block { margin-top: 8px; font-size: 13px; line-height: 1.6; }
    .v-block .lbl { color: var(--text-tertiary); font-size: 11px; }
    .chip-file { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius-round); padding: 3px 10px; cursor: pointer; margin: 4px 6px 0 0; }
    .chip-file:hover { border-color: var(--brand-primary); color: var(--brand-primary); }
    .v-actions { display: flex; gap: 6px; margin-top: 10px; }
    .cmp { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cmp .col { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px; }
    .cmp .col h5 { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-breadcrumb">
        <a href="./list.html">项目</a><span class="sep">/</span>
        <span class="current">版本管理与溯源</span>
      </div>
      <div class="page-title-bar">
        <div>
          <div class="page-title">版本管理与溯源</div>
          <div class="page-title-desc">按 <b>设计阶段</b> 分组查看版本，一眼定位 <b>客户最终意向（定稿）</b>，追溯每版<b>谁 · 何时 · 客户需求 · 改了什么</b>。</div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-primary" id="btn-export">导出版本档案</button>
        </div>
      </div>
    </div>
    <div class="page-body">
      <div class="filter-bar">
        <div class="filter-item"><span class="filter-label">设计阶段</span>
          <select class="filter-select" id="f-stage"><option value="">全部阶段</option></select>
        </div>
        <div class="filter-item"><span class="filter-label">修改人</span>
          <select class="filter-select" id="f-person"><option value="">全部</option></select>
        </div>
        <input class="filter-search" id="f-search" placeholder="搜索客户需求 / 修改内容关键词" />
        <label class="checkbox" style="margin-left:auto;"><input type="checkbox" id="f-final" /> 只看客户确认版本</label>
      </div>

      <div class="layout">
        <div class="file-tree" id="proj-list"></div>
        <div>
          <div class="card" style="padding:16px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-size:18px;font-weight:600;" id="cur-name">-</div>
                <div class="text-sm text-secondary" id="cur-meta">-</div>
              </div>
              <div style="text-align:right;">
                <div class="text-sm text-secondary">当前阶段</div>
                <div id="cur-stage"></div>
              </div>
            </div>
          </div>

          <div class="card" style="padding:16px;margin-bottom:4px;">
            <div class="card-title" style="margin-bottom:12px;">🎯 客户确认版本一览（各阶段最终意向）</div>
            <div class="final-grid" id="final-grid"></div>
          </div>

          <div id="stages"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 附件预览 -->
  <div class="modal-mask" id="file-modal">
    <div class="modal modal-md">
      <div class="modal-header"><div class="modal-title" id="fm-title">附件预览</div><div class="modal-close" onclick="closeModal('file-modal')">✕</div></div>
      <div class="modal-body">
        <div id="fm-preview" style="height:180px;border:1px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-secondary);background:var(--bg-page);"></div>
        <div class="text-sm text-secondary" id="fm-meta" style="margin-top:10px;"></div>
      </div>
      <div class="modal-footer"><button class="btn btn-default" onclick="closeModal('file-modal')">关闭</button><button class="btn btn-primary" id="fm-dl">⬇ 下载</button></div>
    </div>
  </div>

  <!-- 版本对比 -->
  <div class="modal-mask" id="cmp-modal">
    <div class="modal modal-lg">
      <div class="modal-header"><div class="modal-title">版本对比</div><div class="modal-close" onclick="closeModal('cmp-modal')">✕</div></div>
      <div class="modal-body" id="cmp-body"></div>
      <div class="modal-footer"><button class="btn btn-default" onclick="closeModal('cmp-modal')">关闭</button></div>
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/shell.js"></script>
  <script>
    (function () {
      const P = MOCK.scopeProjects(MOCK.PROJECTS);
      let curId = getQuery('id') || (P[0] && P[0].id);
      if (!P.find(p => p.id === curId)) curId = P[0] && P[0].id;

      function designStages(pid) { return MOCK.getTaskTimeline(pid).filter(n => n.design); }
      function fileIcon(t) { return ({ pdf: '📄', dwg: '📐', zip: '🗜️', img: '🖼️' })[t] || '📎'; }
      function starsVerCount(pid) { let c = 0; designStages(pid).forEach(n => c += n.versions.length); return c; }

      // 左侧项目树（样式与「文件归档」一致）
      function renderProjects() {
        const box = document.getElementById('proj-list');
        const totalVers = P.reduce((s, p) => s + starsVerCount(p.id), 0);
        let html = `<div class="tree-node open" data-node="__all">
          <div class="tree-row">
            <span class="tree-caret">▶</span>
            <span class="tree-ico">🗂</span>
            <div class="tree-main"><div class="tree-title">全部项目</div><div class="tree-sub">${P.length} 个项目 · ${totalVers} 个版本</div></div>
          </div><div class="tree-children">`;
        P.forEach(p => {
          const cust = MOCK.getCustomer(p.customer);
          const dsg = MOCK.names([...(p.d2d || []), ...(p.d3d || [])]) || '—';
          html += `<div class="tree-node">
            <div class="tree-row ${p.id === curId ? 'active' : ''}" data-id="${p.id}">
              <span class="tree-caret" style="visibility:hidden;">▶</span>
              <span class="tree-ico">📁</span>
              <div class="tree-main"><div class="tree-title">${p.name}</div><div class="tree-sub">${p.code} · ${cust.name} · ${dsg}</div></div>
              <span class="tree-count">${starsVerCount(p.id)} 版</span>
            </div>
          </div>`;
        });
        html += `</div></div>`;
        box.innerHTML = html;
        box.querySelectorAll('.tree-row[data-id]').forEach(el => el.addEventListener('click', () => { curId = el.dataset.id; render(); }));
      }

      // 阶段内版本状态判定
      function labelFor(node, v, lastDone) {
        if (v.status !== 'done') return { t: '客户需求 · 待处理', c: 'tag-warning', cls: 'pending' };
        if (v === lastDone) return node.status === 'done'
          ? { t: '✓ 客户最终意向 · 定稿', c: 'tag-success', cls: 'final' }
          : { t: '当前版本 · 待客户确认', c: 'tag-brand', cls: 'current' };
        return { t: '历史版本', c: '', cls: '' };
      }
      function lastDoneOf(node) { const d = node.versions.filter(v => v.status === 'done'); return d[d.length - 1] || null; }

      function chip(f) { return `<span class="chip-file" data-fname="${f.name}" data-ftype="${f.type}">${fileIcon(f.type)} ${f.name}</span>`; }

      function verRowHtml(node, v, lastDone) {
        const lab = labelFor(node, v, lastDone);
        const d = MOCK.DESIGNERS.find(x => x.name === v.completedBy) || null;
        return `<div class="v-row ${lab.cls}">
          <div class="v-top">
            <div style="display:flex;align-items:center;gap:8px;"><span class="v-tag">${v.v}</span><span class="tag ${lab.c}">${lab.t}</span></div>
            <div class="v-who">
              ${v.status === 'done' ? `<div class="avatar sm" data-color="${colorFrom(v.completedBy || '设计师')}">${initials(v.completedBy || '师')}</div><span class="text-sm">${v.completedBy || '—'}${d ? ' · ' + MOCK.deptShort(d.dept) : ''}</span><span class="text-sm text-secondary">${v.completedAt || ''}</span>` : `<span class="text-sm text-secondary">👤 ${v.requestedBy || ''} · ${v.requestedAt || ''}</span>`}
            </div>
          </div>
          <div class="v-block"><span class="lbl">📩 客户需求：</span>${v.customerReq || '—'}</div>
          ${v.status === 'done' ? `<div class="v-block"><span class="lbl">🎨 本版改动（${v.reason || '—'}）：</span>${v.changes || '—'}</div>` : '<div class="v-block" style="color:#B4530A;">⏳ 待设计师产出</div>'}
          ${v.deliverables && v.deliverables.length ? `<div>${v.deliverables.map(chip).join('')}</div>` : ''}
          ${v.status === 'done' ? `<div class="v-actions">
            <button class="btn btn-default btn-sm" data-preview="1">👁 预览</button>
            <button class="btn btn-ghost btn-sm" data-cmp="${node.code}::${v.id}">↔ 对比上一版</button>
            <button class="btn btn-ghost btn-sm" data-milestone="1">📌 设为定稿</button>
          </div>` : ''}
        </div>`;
      }

      function render() {
        const p = MOCK.getProject(curId);
        renderProjects();
        const cust = MOCK.getCustomer(p.customer);
        document.getElementById('cur-name').textContent = p.name;
        document.getElementById('cur-meta').textContent = `${p.code} · ${p.type} · ${p.region} · 客户 ${cust.name}`;
        document.getElementById('cur-stage').innerHTML = `<span class="tag tag-brand">${p.stage} · ${p.progress}%</span>`;

        const stages = designStages(curId);

        // 阶段筛选下拉
        const fStage = document.getElementById('f-stage');
        if (fStage.dataset.pid !== curId) {
          fStage.dataset.pid = curId;
          fStage.innerHTML = '<option value="">全部阶段</option>' + stages.map(n => `<option value="${n.code}">${n.name}</option>`).join('');
          // 修改人
          const persons = [...new Set(stages.flatMap(n => n.versions.filter(v => v.status === 'done').map(v => v.completedBy)).filter(Boolean))];
          document.getElementById('f-person').innerHTML = '<option value="">全部</option>' + persons.map(x => `<option>${x}</option>`).join('');
        }
        const fs = fStage.value, fp = document.getElementById('f-person').value, kw = document.getElementById('f-search').value.trim(), onlyFinal = document.getElementById('f-final').checked;

        // 客户确认版本一览
        document.getElementById('final-grid').innerHTML = stages.map(n => {
          const ld = lastDoneOf(n);
          const done = n.status === 'done';
          if (!ld) return `<div class="final-card"><div class="fc-stage">${n.name}</div><div class="fc-ver" style="font-size:15px;color:var(--text-secondary);">尚未产出</div><div class="fc-req">该阶段暂无版本</div></div>`;
          return `<div class="final-card ${done ? 'done' : 'active'}">
            <div class="fc-stage">${n.name}</div>
            <div class="fc-ver">${ld.v} <span class="tag ${done ? 'tag-success' : 'tag-brand'}" style="vertical-align:middle;">${done ? '客户定稿' : '待确认'}</span></div>
            <div class="fc-req">📩 ${ld.customerReq || '—'}</div>
            <div class="fc-foot"><span>🎨 ${ld.completedBy || '—'}</span><span>${(ld.completedAt || '').slice(0, 10)}</span></div>
          </div>`;
        }).join('') || '<div class="text-sm text-secondary">该项目暂无设计阶段版本</div>';

        // 阶段分组
        const host = document.getElementById('stages');
        const visStages = stages.filter(n => !fs || n.code === fs);
        host.innerHTML = visStages.map(n => {
          const ld = lastDoneOf(n);
          let vers = n.versions.slice().reverse(); // 新→旧
          if (fp) vers = vers.filter(v => v.completedBy === fp);
          if (kw) vers = vers.filter(v => (v.customerReq || '').includes(kw) || (v.changes || '').includes(kw));
          if (onlyFinal) vers = vers.filter(v => v.status === 'done' && v === ld);
          const stTag = n.status === 'done' ? '<span class="tag tag-success">已定稿</span>' : n.status === 'active' ? '<span class="tag tag-brand">进行中</span>' : '<span class="tag">未开始</span>';
          const body = vers.length ? vers.map(v => verRowHtml(n, v, ld)).join('') : '<div class="text-sm text-placeholder" style="padding:8px 0;">无符合条件的版本</div>';
          return `<div class="stage-sec">
            <div class="stage-head"><span style="font-size:18px;">${n.code === 'ms3' ? '📐' : n.code === 'ms5' ? '🎨' : '🏠'}</span><span class="st-name">${n.name}</span>${stTag}<span class="text-sm text-secondary" style="margin-left:auto;">${n.versions.length} 版</span></div>
            <div class="stage-body">${body}</div>
          </div>`;
        }).join('') || '<div class="empty" style="padding:40px 0;"><div class="empty-title">该项目暂无设计阶段版本</div></div>';

        bindActions();
      }

      function bindActions() {
        document.querySelectorAll('#stages .chip-file').forEach(c => c.addEventListener('click', () => openFile(c.dataset.fname, c.dataset.ftype)));
        document.querySelectorAll('#stages [data-preview]').forEach(b => b.addEventListener('click', () => toast('打开版本预览（演示占位）', 'info')));
        document.querySelectorAll('#stages [data-milestone]').forEach(b => b.addEventListener('click', () => toast('已标记为定稿版本', 'success')));
        document.querySelectorAll('#stages [data-cmp]').forEach(b => b.addEventListener('click', () => openCompare(b.dataset.cmp)));
      }

      function openFile(name, type) {
        document.getElementById('fm-title').textContent = name;
        const map = { pdf: 'PDF 文档', dwg: 'CAD 图纸', img: '图片 / 720°', zip: '压缩包' };
        document.getElementById('fm-preview').innerHTML = `<div style="font-size:44px;">${fileIcon(type)}</div><div>${map[type] || '附件'} 预览（演示占位）</div>`;
        document.getElementById('fm-meta').textContent = '文件：' + name;
        openModal('file-modal');
      }
      document.getElementById('fm-dl').addEventListener('click', () => { closeModal('file-modal'); toast('下载中（演示占位文件）', 'info'); });

      function openCompare(key) {
        const [code, vid] = key.split('::');
        const node = designStages(curId).find(n => n.code === code);
        const dones = node.versions.filter(v => v.status === 'done');
        const idx = dones.findIndex(v => v.id === vid);
        const cur = dones[idx], prev = idx > 0 ? dones[idx - 1] : null;
        const colHtml = (v, title) => v ? `<div class="col"><h5>${title} · <span class="v-tag">${v.v}</span></h5>
          <div class="v-block"><span class="lbl">📩 客户需求：</span>${v.customerReq || '—'}</div>
          <div class="v-block"><span class="lbl">🎨 本版改动：</span>${v.changes || '—'}</div>
          <div class="v-block"><span class="lbl">产出物：</span>${(v.deliverables || []).map(f => fileIcon(f.type) + ' ' + f.name).join('、') || '—'}</div>
          <div class="text-sm text-secondary" style="margin-top:6px;">${v.completedBy || ''} · ${v.completedAt || ''}</div></div>` : `<div class="col"><h5>${title}</h5><div class="text-sm text-placeholder">无上一版（首版方案）</div></div>`;
        document.getElementById('cmp-body').innerHTML = `<div class="text-sm text-secondary" style="margin-bottom:10px;">${node.name} · 对比相邻两个已产出版本</div><div class="cmp">${colHtml(prev, '上一版')}${colHtml(cur, '当前版')}</div>`;
        openModal('cmp-modal');
      }

      ['f-stage', 'f-person'].forEach(id => document.getElementById(id).addEventListener('change', render));
      document.getElementById('f-search').addEventListener('input', debounce(render, 200));
      document.getElementById('f-final').addEventListener('change', render);
      document.getElementById('btn-export').addEventListener('click', () => toast('已导出「' + MOCK.getProject(curId).name + '」全部版本档案（演示）', 'success'));

      render();
    })();
  </script>
</body>
</html>
