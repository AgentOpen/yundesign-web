<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的任务 · 敬城设计云</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <style>
    .task-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-card); margin-bottom: 16px; transition: var(--transition-fast); position: relative; }
    .task-card:hover { box-shadow: var(--shadow-hover); }
    .task-card.urgency-加急 { border-left: 4px solid var(--warning); }
    .task-card.urgency-紧急 { border-left: 4px solid var(--danger); }
    .task-card.urgency-正常 { border-left: 4px solid var(--info); }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .task-title { font-size: 18px; font-weight: 600; }
    .task-meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px 0; }
    .task-meta > div { font-size: 13px; }
    .task-meta .meta-label { color: var(--text-secondary); margin-bottom: 4px; }
    .task-meta .meta-value { color: var(--text-primary); font-weight: 500; }
    .task-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--divider); }
    .space-tags { display: flex; flex-wrap: wrap; gap: 4px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-breadcrumb">
        <a href="./dashboard.html">工作台</a>
        <span class="sep">/</span>
        <span class="current">我的任务</span>
      </div>
      <div class="page-title-bar">
        <div>
          <div class="page-title">我的任务</div>
          <div class="page-title-desc">收到派单后，请在 24 小时内 <b style="color:var(--brand-primary)">接受</b> 或 <b style="color:var(--danger)">拒接（需填写理由）</b>。超过 48 小时未处理，系统视为拒接。</div>
        </div>
      </div>
    </div>
    <div class="page-body">
      <div class="tabs" style="background:white;border-radius:8px;margin-bottom:16px;">
        <div class="tab-item active" data-tab="pending">待接单 <span class="count" id="cnt-pending">0</span></div>
        <div class="tab-item" data-tab="accepted">进行中 <span class="count" id="cnt-accepted">0</span></div>
        <div class="tab-item" data-tab="rejected">已拒接 <span class="count" id="cnt-rejected">0</span></div>
        <div class="tab-item" data-tab="done">已完成 <span class="count" id="cnt-done">0</span></div>
      </div>

      <div id="task-list"></div>

      <div class="empty hidden" id="empty">
        <div class="empty-illustration">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="4" y="6" width="16" height="14" rx="2"/><path d="M9 10h6"/><path d="M9 14h4"/></svg>
        </div>
        <div class="empty-title">目前没有新任务分派给你</div>
        <div class="empty-desc">当分单管理员分配新任务给你时，你会立即收到通知</div>
      </div>
    </div>
  </div>

  <!-- 拒接理由弹窗 -->
  <div class="modal-mask" id="reject-modal">
    <div class="modal modal-md">
      <div class="modal-header">
        <div class="modal-title">拒接任务 · 请填写理由</div>
        <div class="modal-close" onclick="closeModal('reject-modal')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">拒接原因 <span class="required">*</span></label>
          <select class="input" id="reject-reason">
            <option value="">请选择原因</option>
            <option>档期冲突（已有多个高优项目）</option>
            <option>技能不匹配（不在我的专长范围）</option>
            <option>已休假 / 出差</option>
            <option>该项目风格不熟悉，建议改派</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">详细说明（选填）</label>
          <textarea class="textarea" id="reject-detail" placeholder="请说明具体情况，方便运营改派" rows="4"></textarea>
        </div>
        <div class="form-item" style="margin-bottom:0;">
          <div style="background:var(--warning-bg);color:#B4530A;padding:12px;border-radius:6px;font-size:13px;">
            ⚠ 拒接后运营会将该任务重新派给其他设计师；系统会记录你的拒接次数，累计过多会影响后续分单权重。
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal('reject-modal')">取消</button>
        <button class="btn btn-danger" id="reject-confirm">确认拒接</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/mock-data.js"></script>
  <script src="../assets/js/shell.js"></script>
  <script>
    (function () {
      let tasks = [...MOCK.MY_TASKS];
      let currentTab = 'pending';
      let currentRejectId = null;

      function updateCounts() {
        ['pending', 'accepted', 'rejected', 'done'].forEach(s => {
          document.getElementById('cnt-' + s).textContent = tasks.filter(t => t.status === s).length;
        });
      }

      function render() {
        const list = document.getElementById('task-list');
        list.innerHTML = '';
        const filtered = tasks.filter(t => t.status === currentTab);
        updateCounts();
        document.getElementById('empty').classList.toggle('hidden', filtered.length > 0);

        filtered.forEach(t => {
          const card = document.createElement('div');
          card.className = 'task-card urgency-' + t.urgency;
          const taskDesc = t.task === '全案' ? '全案（全部空间）' : `指定面积 ${t.taskArea} ㎡`;
          // 任务信息四宫格（进行中/完成 用不同第四格）
          let metaFourth = `<div><div class="meta-label">预计工时</div><div class="meta-value">${t.estimatedHours || '-'} h</div></div>`;
          if (t.status === 'accepted') metaFourth = `<div><div class="meta-label">当前版本</div><div class="meta-value">${t.version || '-'}</div></div>`;
          if (t.status === 'done') metaFourth = `<div><div class="meta-label">评分</div><div class="meta-value">⭐ ${t.score || '-'}</div></div>`;

          let footer = `<div style="font-size:12px;color:var(--text-secondary);">派单人：${t.assigner} · ${t.assignedAt}</div>`;
          if (currentTab === 'pending') {
            footer += `<div style="display:flex;gap:8px;">
                <button class="btn btn-default" data-detail="${t.id}">查看详情</button>
                <button class="btn btn-danger-ghost" data-reject="${t.id}">拒接...</button>
                <button class="btn btn-primary" data-accept="${t.id}">✓ 接受任务</button>
              </div>`;
          } else if (currentTab === 'accepted') {
            footer += `<div style="display:flex;gap:8px;">
                <button class="btn btn-default" data-detail="${t.id}">查看详情</button>
                <button class="btn btn-primary" data-upload="${t.id}">上传新版本</button>
              </div>`;
          } else if (currentTab === 'rejected') {
            footer += `<button class="btn btn-default" data-reapply="${t.id}">申请复议</button>`;
          } else {
            footer += `<button class="btn btn-default" data-detail="${t.id}">查看交付</button>`;
          }

          // 进行中：进度条；已拒接：拒接原因；
          let extra = `
            <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">负责空间</div>
            <div class="space-tags">${(t.responsibleSpaces || []).map(s => `<span class="tag tag-info">${s}</span>`).join('')}</div>`;
          if (t.status === 'accepted') {
            extra += `<div style="margin-top:12px;">
              <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px;"><span>设计进度</span><span>${t.progress}% · 下一节点：${t.nextMilestone || '-'}</span></div>
              <div class="progress"><div class="progress-bar ${t.progress >= 80 ? 'success' : ''}" style="width:${t.progress}%;"></div></div>
            </div>`;
          }
          if (t.status === 'rejected') {
            extra += `<div style="margin-top:12px;background:var(--danger-bg);color:var(--danger);padding:10px 12px;border-radius:6px;font-size:13px;">拒接原因：${t.rejectReason || '-'} · ${t.rejectedAt || ''}</div>`;
          }
          if (t.status === 'done') {
            extra += `<div style="margin-top:12px;background:var(--success-bg);color:var(--success);padding:10px 12px;border-radius:6px;font-size:13px;">✓ 已于 ${t.doneAt} 交付并通过验收</div>`;
          }

          card.innerHTML = `
            <div class="task-header">
              <div>
                <div class="task-title">${t.project}</div>
                <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">
                  ${t.order} · ${t.customer} · <span class="tag tag-${t.urgency === '紧急' ? 'danger' : (t.urgency === '加急' ? 'warning' : 'info')}">${t.urgency === '紧急' ? '🚨 紧急' : (t.urgency === '加急' ? '🚩 加急' : '正常')}</span>
                </div>
              </div>
              <div style="text-align:right;">
                <div class="tag tag-brand">${t.role}</div>
                <div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">${t.dept}</div>
              </div>
            </div>
            <div class="task-meta">
              <div><div class="meta-label">面积 / 任务</div><div class="meta-value">${t.area} ㎡ · ${taskDesc}</div></div>
              <div><div class="meta-label">区域</div><div class="meta-value">${t.region}</div></div>
              <div><div class="meta-label">期望完成</div><div class="meta-value">${t.deadline}</div></div>
              ${metaFourth}
            </div>
            ${extra}
            <div class="task-footer">${footer}</div>
          `;
          list.appendChild(card);
        });

        // 绑定事件
        list.querySelectorAll('[data-accept]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-accept');
            const task = tasks.find(t => t.id === id);
            const ok = await confirmDialog(
              '确认接受任务？',
              `确认在期望完成时间 <b>${task.deadline}</b> 前交付 <b>${task.role} · ${task.project}</b> V1 版本？`
            );
            if (ok) {
              task.status = 'accepted';
              toast('已接受任务：' + task.project + '，已通知运营与协调员', 'success');
              render();
            }
          });
        });
        list.querySelectorAll('[data-reject]').forEach(btn => {
          btn.addEventListener('click', () => {
            currentRejectId = btn.getAttribute('data-reject');
            document.getElementById('reject-reason').value = '';
            document.getElementById('reject-detail').value = '';
            openModal('reject-modal');
          });
        });
        list.querySelectorAll('[data-detail]').forEach(btn => {
          btn.addEventListener('click', () => {
            toast('打开设计单详情演示中', 'info');
          });
        });
        list.querySelectorAll('[data-upload]').forEach(btn => {
          btn.addEventListener('click', () => toast('上传新版本演示中（将写入版本溯源）', 'info'));
        });
        list.querySelectorAll('[data-reapply]').forEach(btn => {
          btn.addEventListener('click', () => toast('已提交复议，运营将重新评估该派单', 'success'));
        });
      }

      // Tab 切换
      document.querySelectorAll('.tab-item').forEach(t => {
        t.addEventListener('click', () => {
          document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          currentTab = t.dataset.tab;
          render();
        });
      });

      // 确认拒接
      document.getElementById('reject-confirm').addEventListener('click', () => {
        const reason = document.getElementById('reject-reason').value;
        if (!reason) { toast('请选择拒接原因', 'warning'); return; }
        const task = tasks.find(t => t.id === currentRejectId);
        if (task) {
          task.status = 'rejected';
          task.rejectReason = reason;
          closeModal('reject-modal');
          toast('已拒接：' + task.project + '，运营将在 30 分钟内改派', 'success');
          render();
        }
      });

      render();
    })();
  </script>
</body>
</html>
